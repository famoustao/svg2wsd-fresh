name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pillow potracer numpy opencv-python

      - name: Build CLI EXE
        run: pyinstaller --onefile --clean --name svg2wsd svg2wsd.py

      - name: Build GUI EXE
        run: pyinstaller --onefile --windowed --clean --name svg2wsd_gui svg2wsd_gui.py

      - name: Copy template
        run: |
          xcopy /E /I template dist\template
          xcopy /E /I wsd_label_samples dist\wsd_label_samples

      - name: Create release zip
        run: |
          $commit = $env:GITHUB_SHA.Substring(0, 7)
          $zipName = "svg2wsd-windows-$commit.zip"
          Compress-Archive -Path dist\* -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload artifact (备用)
        uses: actions/upload-artifact@v4
        with:
          name: svg2wsd-windows
          path: ${{ env.ZIP_NAME }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: 最新构建
          body: |
            ## svg2wsd 最新自动构建
            
            提交: `${{ github.sha }}`
            
            ### 下载加速（国内用户）
            
            在下载链接前加上镜像地址即可加速：
            
            ```
            https://ghproxy.com/原始下载链接
            ```
            
            或使用：
            ```
            https://mirror.ghproxy.com/原始下载链接
            ```
            
            例：
            `https://ghproxy.com/https://github.com/famoustao/svg2wsd/releases/download/continuous/${{ env.ZIP_NAME }}`
          prerelease: true
          files: ${{ env.ZIP_NAME }}
          fail_on_unmatched_files: true
