name: Cleanup Old Actions

on:
  schedule:
    - cron: '0 0 * * *'  # 每天午夜运行
  workflow_dispatch:      # 支持手动触发

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const now = new Date();
            const cutoffDays = 3;
            const cutoffTime = now.getTime() - (cutoffDays * 24 * 60 * 60 * 1000);
            const keepMinimum = 10;

            let page = 1;
            let allRuns = [];

            // 分页获取所有工作流运行记录
            while (true) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
                page: page
              });

              if (data.workflow_runs.length === 0) break;
              allRuns = allRuns.concat(data.workflow_runs);
              page++;
              if (page > 20) break; // 最多2000条，防止无限循环
            }

            console.log(`Found ${allRuns.length} workflow runs total`);

            // 按时间排序，最新的在前面
            allRuns.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            let deleted = 0;
            let skipped = 0;

            for (let i = keepMinimum; i < allRuns.length; i++) {
              const run = allRuns[i];
              const runTime = new Date(run.created_at).getTime();

              // 只删除超过cutoffDays天且状态为completed的记录
              if (runTime < cutoffTime && run.status === 'completed') {
                try {
                  await github.rest.actions.deleteWorkflowRun({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    run_id: run.id
                  });
                  deleted++;
                  console.log(`Deleted run ${run.id} (${run.name}) from ${run.created_at}`);
                } catch (e) {
                  console.log(`Failed to delete run ${run.id}: ${e.message}`);
                }
              } else {
                skipped++;
              }
            }

            console.log(`Cleanup complete: deleted ${deleted}, skipped ${skipped}, total ${allRuns.length}`);
