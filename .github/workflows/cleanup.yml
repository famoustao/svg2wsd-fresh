name: Cleanup Old Actions

on:
  schedule:
    - cron: '0 0 * * *'  # 每天午夜运行
  workflow_dispatch:      # 支持手动触发

permissions:
  actions: write

jobs:
  cleanup-runs:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const now = new Date();
            const cutoffDays = 3;
            const cutoffTime = now.getTime() - (cutoffDays * 24 * 60 * 60 * 1000);
            const keepMinimum = 10;

            let page = 1;
            let allRuns = [];

            while (true) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
                page: page
              });

              if (data.workflow_runs.length === 0) break;
              allRuns = allRuns.concat(data.workflow_runs);
              page++;
              if (page > 20) break;
            }

            console.log(`Found ${allRuns.length} workflow runs total`);

            allRuns.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            let deleted = 0;
            let skipped = 0;

            for (let i = keepMinimum; i < allRuns.length; i++) {
              const run = allRuns[i];
              const runTime = new Date(run.created_at).getTime();

              if (runTime < cutoffTime && run.status === 'completed') {
                try {
                  await github.rest.actions.deleteWorkflowRun({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    run_id: run.id
                  });
                  deleted++;
                  console.log(`Deleted run ${run.id} (${run.name}) from ${run.created_at}`);
                } catch (e) {
                  console.log(`Failed to delete run ${run.id}: ${e.message}`);
                }
              } else {
                skipped++;
              }
            }

            console.log(`Runs cleanup: deleted ${deleted}, skipped ${skipped}, total ${allRuns.length}`);

  cleanup-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Delete ALL artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== 清理所有 artifact ==="
          PAGE=1
          while true; do
            RESPONSE=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100&page=$PAGE" --jq '.artifacts[] | "\(.id)|\(.name)"' 2>/dev/null || true)
            if [ -z "$RESPONSE" ]; then
              break
            fi
            echo "$RESPONSE" | while IFS='|' read -r id name; do
              echo "Deleting artifact: $name (id=$id)"
              gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id" || true
            done
            PAGE=$((PAGE + 1))
            if [ $PAGE -gt 20 ]; then
              break
            fi
          done
          echo "=== Artifact 清理完成 ==="
