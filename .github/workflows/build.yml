name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pillow potracer numpy

      - name: Build CLI EXE
        run: pyinstaller --onefile --clean --name svg2wsd svg2wsd.py

      - name: Build GUI EXE
        run: pyinstaller --onefile --windowed --clean --name svg2wsd_gui svg2wsd_gui.py

      - name: Copy template
        run: |
          xcopy /E /I template dist\template

      - name: Create release zip
        run: |
          Compress-Archive -Path dist\* -DestinationPath svg2wsd-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: svg2wsd-windows
          path: svg2wsd-windows.zip
