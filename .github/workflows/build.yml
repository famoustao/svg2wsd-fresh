name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pillow potracer numpy opencv-python

      - name: Build CLI EXE
        run: pyinstaller --onefile --clean --name svg2wsd svg2wsd.py

      - name: Build GUI EXE
        run: pyinstaller --onefile --windowed --clean --name svg2wsd_gui svg2wsd_gui.py

      - name: Copy template
        run: |
          xcopy /E /I template dist\template
          xcopy /E /I wsd_label_samples dist\wsd_label_samples

      - name: Create release zip
        run: |
          Compress-Archive -Path dist\* -DestinationPath svg2wsd-windows.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: Latest Build
          body: |
            Auto-built from latest commit on main branch.
            Commit: ${{ github.sha }}
          prerelease: true
          files: svg2wsd-windows.zip
          fail_on_unmatched_files: true
