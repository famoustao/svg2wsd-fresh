name: Build Windows EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  cleanup-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Delete ALL old artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== 清理所有旧 artifact ==="
          # 获取所有 artifact（分页）
          PAGE=1
          while true; do
            RESPONSE=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100&page=$PAGE" --jq '.artifacts[] | "\(.id)|\(.name)"' 2>/dev/null || true)
            if [ -z "$RESPONSE" ]; then
              break
            fi
            echo "$RESPONSE" | while IFS='|' read -r id name; do
              echo "Deleting artifact: $name (id=$id)"
              gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id" || true
            done
            PAGE=$((PAGE + 1))
            if [ $PAGE -gt 20 ]; then
              break
            fi
          done
          echo "=== Artifact 清理完成 ==="

  build-windows:
    needs: cleanup-artifacts
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Get version info
        id: version
        run: |
          $commit = $env:GITHUB_SHA.Substring(0, 7)
          echo "COMMIT_SHORT=$commit" >> $env:GITHUB_OUTPUT
          $date = Get-Date -Format "yyyyMMdd"
          echo "BUILD_DATE=$date" >> $env:GITHUB_OUTPUT

      - name: Build GUI EXE
        run: |
          pyinstaller --onefile --windowed --clean `
            --name 图片转WSD `
            --collect-all core `
            --collect-all gui `
            --collect-all modes `
            --collect-all utils `
            --collect-all cairosvg `
            --collect-all cairocffi `
            --hidden-import potrace `
            --hidden-import PIL `
            --hidden-import PIL.Image `
            --hidden-import PIL.ImageTk `
            --hidden-import PIL.ImageDraw `
            --hidden-import cv2 `
            --hidden-import numpy `
            --hidden-import wsd_pure_builder `
            --hidden-import svg2wsd_geo `
            --hidden-import svg2wsd_core `
            --hidden-import wsd_template_builder `
            --hidden-import wsd_unified_builder `
            --hidden-import wsd_records `
            --hidden-import wsd_parser `
            --hidden-import wsd_text `
            --hidden-import tikz_utils `
            --hidden-import cairosvg `
            --hidden-import cairocffi `
            --hidden-import cssselect2 `
            --hidden-import defusedxml `
            --hidden-import tinycss2 `
            --hidden-import pillow `
            app.py

      - name: Copy template and samples
        run: |
          xcopy /E /I template dist\template
          xcopy /E /I wsd_label_samples dist\wsd_label_samples

      - name: Create release zip
        run: |
          $commit = "${{ steps.version.outputs.COMMIT_SHORT }}"
          $zipName = "svg2wsd-windows-$commit.zip"
          Compress-Archive -Path dist\* -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload artifact (best effort)
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: svg2wsd-windows-${{ steps.version.outputs.COMMIT_SHORT }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 1
          if-no-files-found: warn

      - name: Upload to Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: 最新构建
          body: |
            ## 图片转WSD 最新自动构建

            **版本**: v2.0.0
            **提交**: `${{ github.sha }}`
            **构建时间**: ${{ steps.version.outputs.BUILD_DATE }}
            **提交短哈希**: `${{ steps.version.outputs.COMMIT_SHORT }}`

            ### 启动失败排查

            如果双击后没有反应，请查看同目录下的 `svg2wsd_startup.log` 文件获取错误信息。

            ### 下载加速（国内用户）

            在下载链接前加上镜像地址即可加速：

            ```
            https://ghproxy.com/原始下载链接
            ```
          prerelease: true
          files: ${{ env.ZIP_NAME }}
          fail_on_unmatched_files: true
