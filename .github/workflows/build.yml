name: Build Windows EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Get version info
        id: version
        run: |
          $commit = $env:GITHUB_SHA.Substring(0, 7)
          echo "COMMIT_SHORT=$commit" >> $env:GITHUB_OUTPUT
          $date = Get-Date -Format "yyyyMMdd"
          echo "BUILD_DATE=$date" >> $env:GITHUB_OUTPUT

      - name: Build GUI EXE
        run: |
          pyinstaller --onefile --windowed --clean `
            --name 图片转WSD `
            --collect-all core `
            --collect-all gui `
            --collect-all modes `
            --collect-all utils `
            --hidden-import potrace `
            --hidden-import PIL `
            --hidden-import PIL.Image `
            --hidden-import PIL.ImageTk `
            --hidden-import PIL.ImageDraw `
            --hidden-import cv2 `
            --hidden-import numpy `
            --hidden-import wsd_pure_builder `
            --hidden-import svg2wsd_geo `
            --hidden-import svg2wsd_core `
            --hidden-import wsd_template_builder `
            --hidden-import wsd_unified_builder `
            --hidden-import wsd_records `
            --hidden-import wsd_parser `
            --hidden-import wsd_text `
            --hidden-import tikz_utils `
            --hidden-import cairosvg `
            --hidden-import cairocffi `
            app.py

      - name: Copy template and samples
        run: |
          xcopy /E /I template dist\template
          xcopy /E /I wsd_label_samples dist\wsd_label_samples

      - name: Create release zip
        run: |
          $commit = "${{ steps.version.outputs.COMMIT_SHORT }}"
          $zipName = "svg2wsd-windows-$commit.zip"
          Compress-Archive -Path dist\* -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: svg2wsd-windows-${{ steps.version.outputs.COMMIT_SHORT }}
          path: ${{ env.ZIP_NAME }}

      - name: Upload to Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: 最新构建
          body: |
            ## 图片转WSD 最新自动构建

            **版本**: v2.0.0
            **提交**: `${{ github.sha }}`
            **构建时间**: ${{ steps.version.outputs.BUILD_DATE }}
            **提交短哈希**: `${{ steps.version.outputs.COMMIT_SHORT }}`

            ### 🆕 v2.0 新特性

            - 全新架构：基于二进制构建器，完全脱离模板依赖
            - 双模式选项卡：漫画模式 + 几何模式
            - 美观GUI：卡片式布局，深蓝主题，现代化界面
            - 批量处理：支持多文件导入导出，可合并到同一WSD的多画布
            - 5种预览：原图/WSD/SVG/LaTeX/GGB，支持缩放拖拽
            - 后台运行：多线程处理，进度条实时显示，UI不卡顿
            - 左侧面板滚动：文件列表、参数、输出设置、操作全部支持滚动
            - 漫画模式后台计算：复杂图形不再卡顿，进度条实时反馈

            ### 漫画模式
            - 黑白线稿模式（阈值、最小区域、平滑度可调）
            - 实际颜色模式（颜色矢量化，自动填充）
            - 彩色模式（系统随机填充）

            ### 几何模式
            - 形状拟合：直线、三角形、四边形、圆、圆弧
            - 霍夫变换检测 + 去重合并
            - 字母自动识别 + 自动标注
            - 对称性检测（轴对称、旋转对称、中心对称、直角）
            - 颜色模式：黑白线稿 / 实际颜色 / 彩色自动填充

            ### 启动失败排查

            如果双击后没有反应，请查看同目录下的 `svg2wsd_startup.log` 文件获取错误信息。

            ### 下载加速（国内用户）

            在下载链接前加上镜像地址即可加速：

            ```
            https://ghproxy.com/原始下载链接
            ```

            例：
            `https://ghproxy.com/https://github.com/famoustao/svg2wsd/releases/download/continuous/${{ env.ZIP_NAME }}`
          prerelease: true
          files: ${{ env.ZIP_NAME }}
          fail_on_unmatched_files: true
